# PulseOps — put GEMINI_API_KEY in a .env file next to this compose file (Compose uses it for ${...}),
# or export it in your shell. Then: docker compose up --build
services:
  pulseops:
    build: .
    container_name: pulseops
    ports:
      - "8501:8501"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    restart: unless-stopped
