services:
  pulseops:
    build: .
    container_name: pulseops
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      USE_REAL_APIS: ${USE_REAL_APIS:-false}
      PULSEOPS_DB_PATH: /app/data/pulseops_audit.db
    volumes:
      - pulseops_data:/app/data
    restart: unless-stopped

volumes:
  pulseops_data:
